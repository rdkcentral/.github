        key: ${{ runner.os }}-rdk-${{ inputs.rdk-version }}-${{ inputs.rdk-profile }}-${{ inputs.target-platform }}-${{ hashFiles('**/conf/local.conf', '**/conf/bblayers.conf') }}
        restore-keys: |
          ${{ runner.os }}-rdk-${{ inputs.rdk-version }}-${{ inputs.rdk-profile }}-
